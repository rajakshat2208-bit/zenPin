<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log in — ZenPin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    /* ── Tokens (match main app) ───────────────────────────────── */
    :root {
      --purple:#7c3aed; --pink:#db2777; --orange:#f97316;
      --grad-brand:linear-gradient(135deg,#7c3aed 0%,#db2777 52%,#f97316 100%);
      --bg:#fafaf8; --surface:#ffffff; --surface-2:#f4f3f0; --border-2:rgba(0,0,0,.11);
      --text:#1a1714; --text-2:#6b6560; --text-3:#a39d97;
      --f-display:'Playfair Display',Georgia,serif;
      --f-ui:'Plus Jakarta Sans',system-ui,sans-serif;
      --r-md:16px; --r-lg:22px; --r-pill:9999px;
      --ease:cubic-bezier(.4,0,.2,1);
      --ease-spring:cubic-bezier(.34,1.56,.64,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--f-ui);min-height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--bg);-webkit-font-smoothing:antialiased}

    /* ── Animated background ────────────────────────────────────── */
    .auth-bg {
      position:fixed;inset:0;z-index:0;
      background:linear-gradient(135deg,#f5f0ff 0%,#fdf2f8 50%,#fff7ed 100%);
      overflow:hidden;
    }
    .auth-blob {
      position:absolute;border-radius:50%;filter:blur(80px);will-change:transform;
    }
    .ab1{width:500px;height:500px;top:-150px;left:-120px;background:radial-gradient(circle,rgba(124,58,237,.35) 0%,transparent 70%);animation:ab1 18s ease-in-out infinite}
    .ab2{width:420px;height:420px;bottom:-130px;right:-100px;background:radial-gradient(circle,rgba(249,115,22,.3) 0%,transparent 70%);animation:ab2 14s ease-in-out infinite}
    .ab3{width:340px;height:340px;top:40%;left:55%;background:radial-gradient(circle,rgba(219,39,119,.25) 0%,transparent 70%);animation:ab3 11s ease-in-out infinite}
    @keyframes ab1{0%,100%{transform:scale(1)}50%{transform:scale(1.25) rotate(45deg)}}
    @keyframes ab2{0%,100%{transform:scale(1)}50%{transform:scale(1.3) rotate(-60deg)}}
    @keyframes ab3{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,-50px)}}
    .auth-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(124,58,237,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,.04) 1px,transparent 1px);background-size:42px 42px}

    /* ── Layout ─────────────────────────────────────────────────── */
    .auth-wrap {
      position:relative;z-index:1;width:100%;max-width:440px;padding:20px;
      animation:cardrise .7s var(--ease) both;
    }
    @keyframes cardrise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

    /* ── Glass card ─────────────────────────────────────────────── */
    .auth-card {
      background:rgba(255,255,255,.82);
      backdrop-filter:blur(28px);
      -webkit-backdrop-filter:blur(28px);
      border:1px solid rgba(255,255,255,.9);
      border-radius:28px;
      padding:44px 40px;
      box-shadow:0 24px 80px rgba(0,0,0,.12),0 4px 16px rgba(0,0,0,.05),inset 0 1px 0 rgba(255,255,255,.9);
    }

    /* ── Logo row ───────────────────────────────────────────────── */
    .auth-logo-row{display:flex;align-items:center;gap:10px;margin-bottom:32px}
    .auth-gem{width:44px;height:44px;background:var(--grad-brand);border-radius:13px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(124,58,237,.38);flex-shrink:0}
    .auth-wordmark{font-size:1.3rem;font-weight:700;background:var(--grad-brand);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.02em}

    /* ── Headings ───────────────────────────────────────────────── */
    .auth-title{font-family:var(--f-display);font-size:2rem;font-weight:900;letter-spacing:-.03em;line-height:1.1;margin-bottom:8px}
    .auth-title em{font-style:italic;background:var(--grad-brand);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .auth-sub{font-size:.88rem;color:var(--text-2);margin-bottom:30px;line-height:1.6}

    /* ── Form ───────────────────────────────────────────────────── */
    .auth-form{display:flex;flex-direction:column;gap:14px}
    .field-wrap{display:flex;flex-direction:column;gap:5px}
    .field-label{font-size:.72rem;font-weight:800;color:var(--text-3);letter-spacing:.06em;text-transform:uppercase}
    .field-inner{position:relative}
    .field-ico{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none;transition:color .2s}
    .auth-input{
      width:100%;height:50px;padding:0 16px 0 44px;
      background:rgba(255,255,255,.7);
      border:1.5px solid var(--border-2);
      border-radius:var(--r-md);
      font-family:var(--f-ui);font-size:.88rem;color:var(--text);
      outline:none;transition:all .2s var(--ease);
    }
    .auth-input::placeholder{color:var(--text-3)}
    .auth-input:focus{background:white;border-color:#a78bfa;box-shadow:0 0 0 4px rgba(167,139,250,.2)}
    .auth-input:focus~.field-ico,.field-inner:focus-within .field-ico{color:var(--purple)}

    /* Password toggle */
    .pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-3);cursor:pointer;display:flex;padding:4px;transition:color .15s}
    .pw-toggle:hover{color:var(--purple)}

    /* Error message */
    .field-error{font-size:.72rem;color:#ef4444;font-weight:600;display:none;align-items:center;gap:4px}
    .field-error.show{display:flex}

    /* ── Submit button ───────────────────────────────────────────── */
    .auth-submit{
      height:52px;width:100%;margin-top:4px;
      background:var(--grad-brand);
      color:white;border:none;border-radius:var(--r-pill);
      font-family:var(--f-ui);font-size:.95rem;font-weight:800;
      cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
      box-shadow:0 6px 22px rgba(124,58,237,.38);
      transition:all .25s var(--ease);
    }
    .auth-submit:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 32px rgba(124,58,237,.5)}
    .auth-submit:disabled{opacity:.7;cursor:not-allowed;transform:none}

    /* Spinner */
    .spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.35);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:none}
    .auth-submit.loading .spinner{display:block}
    .auth-submit.loading .btn-label{display:none}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Global error banner ─────────────────────────────────────── */
    .auth-error-banner{
      display:none;align-items:center;gap:10px;
      padding:12px 16px;
      background:#fef2f2;border:1px solid #fecaca;border-radius:var(--r-md);
      font-size:.82rem;color:#b91c1c;font-weight:600;margin-bottom:4px;
    }
    .auth-error-banner.show{display:flex}

    /* ── Divider ─────────────────────────────────────────────────── */
    .auth-divider{display:flex;align-items:center;gap:12px;margin:8px 0;font-size:.72rem;color:var(--text-3);font-weight:700;letter-spacing:.04em}
    .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border-2)}

    /* ── Footer link ─────────────────────────────────────────────── */
    .auth-footer{text-align:center;margin-top:20px;font-size:.82rem;color:var(--text-2)}
    .auth-footer a{color:var(--purple);font-weight:700;text-decoration:none}
    .auth-footer a:hover{text-decoration:underline}

    /* ── Success state ───────────────────────────────────────────── */
    .auth-success{display:none;text-align:center;animation:cardrise .5s var(--ease) both}
    .auth-success.show{display:block}
    .success-check{width:64px;height:64px;background:linear-gradient(135deg,#10b981,#059669);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 24px rgba(16,185,129,.35)}

    /* ── Responsive ─────────────────────────────────────────────── */
    @media(max-width:480px){
      .auth-card{padding:32px 24px;border-radius:22px}
      .auth-title{font-size:1.7rem}
    }
  
    
    </style>
</head>
<body>

<style>
/* ── Mascot layout ── */
.auth-mascot {
  position: fixed; top: 50%; transform: translateY(-50%);
  display: flex; flex-direction: column; align-items: center;
  pointer-events: none; z-index: 0;
  opacity: 0.92;
}
.auth-mascot-left  { left: 4vw; }
.auth-mascot-right { right: 4vw; }
@media (max-width: 1100px) { .auth-mascot { display: none !important; } }

.mascot-caption {
  font-size: 0.82rem; color: rgba(200,180,255,0.7);
  margin-top: 12px; text-align: center;
  font-family: sans-serif;
}
.mascot-scene { position: relative; width: 140px; height: 200px; }

/* Dog ball bounces up and down */
.dog-ball {
  position: absolute; left: 50%; transform: translateX(-50%);
  top: 0;
  animation: dogBallBounce 1.6s cubic-bezier(0.36,0,0.66,1) infinite alternate;
}
@keyframes dogBallBounce {
  0%   { top: 10px; transform: translateX(-50%) scale(1,1); }
  85%  { transform: translateX(-50%) scale(1.1,0.9); }
  100% { top: 50px; transform: translateX(-50%) scale(1,1); }
}
/* Dog jumps up to catch */
.mascot-dog {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  animation: dogJump 1.6s cubic-bezier(0.36,0,0.66,1) infinite alternate;
}
@keyframes dogJump {
  0%   { bottom: 0; transform: translateX(-50%) scale(1); }
  100% { bottom: 48px; transform: translateX(-50%) scale(1.05); }
}
/* Dog paws raise */
.dog-paw-left  { animation: pawRaise 1.6s ease-in-out infinite alternate; }
.dog-paw-right { animation: pawRaise 1.6s ease-in-out infinite alternate; }
@keyframes pawRaise {
  0%   { transform: rotate(0deg); }
  100% { transform: rotate(-30deg); }
}
/* Dog tail wag */
.dog-tail { animation: tailWag 0.5s ease-in-out infinite alternate; transform-origin: 82px 90px; }
@keyframes tailWag {
  0%   { transform: rotate(-10deg); }
  100% { transform: rotate(15deg); }
}

/* Cat ball floats */
.cat-ball {
  position: absolute; right: 10px; top: 0;
  animation: catBallFloat 2s ease-in-out infinite alternate;
}
@keyframes catBallFloat {
  0%   { top: 5px; }
  100% { top: 55px; }
}
/* Cat jumps */
.mascot-cat {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  animation: catJump 2s ease-in-out infinite alternate;
}
@keyframes catJump {
  0%   { bottom: 0; transform: translateX(-50%) rotate(-3deg); }
  100% { bottom: 55px; transform: translateX(-50%) rotate(3deg); }
}
/* Cat tail sways */
.cat-tail { animation: catTailSway 1.2s ease-in-out infinite alternate; transform-origin: 72px 105px; }
@keyframes catTailSway {
  0%   { transform: rotate(-8deg); }
  100% { transform: rotate(12deg); }
}
/* Cat paws raise */
.cat-paw-left  { animation: catPawLeft  2s ease-in-out infinite alternate; }
.cat-paw-right { animation: catPawRight 2s ease-in-out infinite alternate; }
@keyframes catPawLeft  { 0% { transform: rotate(0deg); } 100% { transform: rotate(-35deg); } }
@keyframes catPawRight { 0% { transform: rotate(0deg); } 100% { transform: rotate(35deg); } }
</style>

<div class="auth-bg-overlay"></div>

<!-- Background -->

  <div class="auth-blob ab1"></div>

</div>

<!-- Card -->
<div class="auth-wrap">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo-row">
      <div class="auth-gem">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="white" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="auth-wordmark">ZenPin</span>
    </div>

    <!-- Heading -->
    <h1 class="auth-title">Welcome<br><em>back.</em></h1>
    <p class="auth-sub">Log in to your ZenPin account to continue creating.</p>

    <!-- Error banner -->
    <div class="auth-error-banner" id="errorBanner">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="errorText">Something went wrong.</span>
    </div>

    <!-- Form -->
    <form class="auth-form" id="loginForm" novalidate>

      <!-- Email -->
      <div class="field-wrap">
        <label class="field-label" for="email">Email</label>
        <div class="field-inner">
          <svg class="field-ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input class="auth-input" id="email" type="email" placeholder="you@example.com" autocomplete="email"/>
        </div>
        <div class="field-error" id="emailErr">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/></svg>
          <span>Enter a valid email address</span>
        </div>
      </div>

      <!-- Password -->
      <div class="field-wrap">
        <label class="field-label" for="password">Password</label>
        <div class="field-inner">
          <svg class="field-ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input class="auth-input" id="password" type="password" placeholder="Your password" autocomplete="current-password"/>
          <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eyeIcon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="field-error" id="pwErr">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/></svg>
          <span>Password is required</span>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="auth-submit" id="submitBtn">
        <span class="btn-label">Log in to ZenPin</span>
        <div class="spinner"></div>
      </button>
      <div style="text-align:center;margin-top:4px">
        <button type="button" id="switchOtpBtn" style="background:none;border:none;color:var(--text-3);font-size:.82rem;cursor:pointer;text-decoration:underline;padding:4px 0">
          Sign in with email code instead
        </button>
      </div>

      <!-- OTP login step (hidden by default) -->
      <div id="otpLoginStep" style="display:none;margin-top:4px">
        <label class="field-label" for="otpLoginCode">6-Digit Code</label>
        <div class="field-inner">
          <input class="auth-input" id="otpLoginCode" type="text" inputmode="numeric"
            maxlength="6" placeholder="123456" autocomplete="one-time-code"/>
        </div>
        <p id="otpLoginHint" style="font-size:.8rem;color:var(--text-3);margin-top:6px"></p>
        <button type="button" class="auth-submit" id="otpLoginSendBtn" style="margin-top:8px">
          <span class="btn-label">Send Code</span>
          <div class="spinner"></div>
        </button>
        <button type="button" class="auth-submit" id="otpLoginVerifyBtn"
          style="display:none;margin-top:8px">
          <span class="btn-label">Verify Code &amp; Sign In</span>
          <div class="spinner"></div>
        </button>
      </div>

    </form>

    <div class="auth-divider">or</div>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Sign up free</a>
    </div>

  </div>
</div>

<script>
  // ── Redirect if already logged in ─────────────────────────────
  const _tok = localStorage.getItem("zenpin_token");
  if (_tok) {
    const _next = new URLSearchParams(window.location.search).get("next");
    window.location.href = _next || "index.html";
  }

  const API_URL = "https://zenpin-api.onrender.com";

  // Wake up Render on page load
  fetch(API_URL + "/", { mode: "cors", credentials: "omit" }).catch(() => {});

  // ── Password toggle ───────────────────────────────────────────
  document.getElementById("pwToggle").onclick = function() {
    const inp = document.getElementById("password");
    const showing = inp.type === "text";
    inp.type = showing ? "password" : "text";
    document.getElementById("eyeIcon").innerHTML = showing
      ? `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`
      : `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
  };

  // ── Validation ────────────────────────────────────────────────
  function showErr(id, show) {
    document.getElementById(id).classList.toggle("show", show);
  }
  function setError(msg) {
    document.getElementById("errorText").textContent = msg;
    document.getElementById("errorBanner").classList.add("show");
  }
  function clearError() {
    document.getElementById("errorBanner").classList.remove("show");
  }

  // ── Form submit ───────────────────────────────────────────────
  document.getElementById("loginForm").onsubmit = async function(e) {
    e.preventDefault();
    clearError();

    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    // Validate
    let ok = true;
    const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    showErr("emailErr", !emailOk); if (!emailOk) ok = false;
    showErr("pwErr", !password);   if (!password) ok = false;
    if (!ok) return;

    // Submit
    const btn = document.getElementById("submitBtn");
    btn.classList.add("loading"); btn.disabled = true;

    // Retry logic — handles Render cold starts
    let lastErr = null;
    for (let attempt = 1; attempt <= 3; attempt++) {
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 30000);
        const res = await fetch(`${API_URL}/auth/login`, {
          method: "POST",
          mode: "cors",
          credentials: "omit",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
          signal: controller.signal,
        });
        clearTimeout(timeout);
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          setError(data.detail || "Login failed. Check your email and password.");
          btn.classList.remove("loading"); btn.disabled = false;
          return;
        }
        localStorage.setItem("zenpin_token", data.token);
        localStorage.setItem("zenpin_user", JSON.stringify(data.user));
        const next = new URLSearchParams(window.location.search).get("next");
        window.location.href = next || "index.html";
        return;
      } catch (err) {
        lastErr = err;
        if (attempt < 3) {
          setError(`Server is waking up... retrying (${attempt}/3)`);
          await new Promise(r => setTimeout(r, 3000));
        }
      }
    }
    setError("Could not reach server after 3 attempts. Please try again in 30 seconds.");
    console.error("Login failed:", lastErr);
    btn.classList.remove("loading"); btn.disabled = false;
  };

  // Live field clearing
  document.getElementById("email").oninput    = () => showErr("emailErr", false);
  document.getElementById("password").oninput = () => showErr("pwErr", false);

  // ── OTP login flow ────────────────────────────────────────────
  let _otpLoginMode = false;

  document.getElementById("switchOtpBtn").onclick = function() {
    _otpLoginMode = !_otpLoginMode;
    const pwWrap = document.getElementById("password").closest(".field-wrap");
    const otpStep = document.getElementById("otpLoginStep");
    pwWrap.style.display = _otpLoginMode ? "none" : "";
    document.getElementById("submitBtn").style.display = _otpLoginMode ? "none" : "";
    otpStep.style.display = _otpLoginMode ? "block" : "none";
    this.textContent = _otpLoginMode
      ? "Sign in with password instead"
      : "Sign in with email code instead";
    clearError();
  };

  document.getElementById("otpLoginSendBtn").onclick = async function() {
    const email = document.getElementById("email").value.trim();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showErr("emailErr", true); return;
    }
    const btn = this;
    btn.classList.add("loading"); btn.disabled = true;
    clearError();
    try {
      const res  = await fetch(`${API_URL}/auth/otp/send`, {
        method: "POST", mode: "cors", credentials: "omit",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) { setError(data.detail || "Could not send code."); return; }
      const hint = document.getElementById("otpLoginHint");
      if (data.demo_otp) {
        hint.innerHTML = `<strong style="color:var(--purple)">Dev mode — your code: ${data.demo_otp}</strong>`;
      } else {
        hint.textContent = "Code sent — check your inbox.";
      }
      document.getElementById("otpLoginVerifyBtn").style.display = "";
      btn.textContent = "Resend Code";
    } catch (err) {
      setError("Server error. Please try again.");
    } finally {
      btn.classList.remove("loading"); btn.disabled = false;
    }
  };

  document.getElementById("otpLoginVerifyBtn").onclick = async function() {
    const email = document.getElementById("email").value.trim();
    const otp   = document.getElementById("otpLoginCode").value.trim();
    if (!otp || otp.length < 6) {
      document.getElementById("otpLoginHint").textContent = "Enter the 6-digit code."; return;
    }
    const btn = this;
    btn.classList.add("loading"); btn.disabled = true;
    clearError();
    try {
      // Verify OTP
      const vRes  = await fetch(`${API_URL}/auth/otp/verify`, {
        method: "POST", mode: "cors", credentials: "omit",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, otp }),
      });
      const vData = await vRes.json().catch(() => ({}));
      if (!vRes.ok) { setError(vData.detail || "Incorrect code."); return; }

      // OTP valid — do a passwordless login attempt
      // Try signup-with-otp first; if user exists it will fail gracefully
      // then fall back to a regular login with a dummy password that won't work,
      // so we need the backend to support OTP-verified sessions.
      // For now: verify OTP then call /auth/login with stored credentials,
      // OR use /auth/signup-with-otp if the user is new.
      // Simple approach: after OTP verify, redirect with token if backend returns one.
      if (vData.token) {
        localStorage.setItem("zenpin_token", vData.token);
        localStorage.setItem("zenpin_user", JSON.stringify(vData.user || {}));
        const next = new URLSearchParams(window.location.search).get("next");
        window.location.href = next || "index.html";
        return;
      }
      // If no token from verify, show success and let user complete password login
      document.getElementById("otpLoginHint").innerHTML =
        `<span style="color:#10b981">✓ Identity confirmed. Enter your password to complete sign-in.</span>`;
      document.getElementById("switchOtpBtn").click(); // switch back to password mode
    } catch (err) {
      setError("Verification failed. Please try again.");
    } finally {
      btn.classList.remove("loading"); btn.disabled = false;
    }
  };

  /* ── Floating gallery background ───────────────────────── */
    window.buildAuthGallery && window.buildAuthGallery('login');// Mouse parallax — depth-layered movement

</script>
</body>
</html>
